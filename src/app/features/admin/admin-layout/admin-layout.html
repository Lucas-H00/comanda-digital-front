<mat-sidenav-container class="sidenav-container">

  <!-- SIDEBAR -->
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <mat-icon>restaurant</mat-icon>
      <span>Comanda Digital</span>
      <small>Painel Admin</small>
    </div>

    <mat-divider></mat-divider>

    <mat-nav-list>
      @for (item of menuItems; track item.rota) {
        <a mat-list-item
          [routerLink]="item.rota"
          routerLinkActive="menu-ativo">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <mat-divider></mat-divider>

    <mat-nav-list>
      <a mat-list-item routerLink="/cardapio">
        <mat-icon matListItemIcon>storefront</mat-icon>
        <span matListItemTitle>Ver cardápio</span>
      </a>
      <a mat-list-item (click)="sair()" style="cursor:pointer">
        <mat-icon matListItemIcon>logout</mat-icon>
        <span matListItemTitle>Sair</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- CONTEÚDO PRINCIPAL -->
  <mat-sidenav-content class="main-content">
    <mat-toolbar class="toolbar">
      <span class="toolbar-titulo">Painel Administrativo</span>
      <span class="spacer"></span>
      <span class="admin-badge">
        <mat-icon>account_circle</mat-icon>
        Admin
      </span>
    </mat-toolbar>

    <div class="page-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
